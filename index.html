const canvas = document.getElementById('canvas');
const scene  = document.getElementById('scene');
const pctEl  = document.getElementById('zoom-pct');

const MIN_SCALE = 0.005;
const MAX_SCALE = 50;
let scale = 1, tx = 0, ty = 0;

function applyTransform() {
  scene.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  pctEl.textContent = Math.round(scale * 100) + '%';
}

function zoomAt(cx, cy, factor) {
  const prev = scale;
  scale = Math.min(Math.max(scale * factor, MIN_SCALE), MAX_SCALE);
  const r = scale / prev;
  tx = cx - r * (cx - tx);
  ty = cy - r * (cy - ty);
  applyTransform();
}

function zoomBy(delta) {
  const r = canvas.getBoundingClientRect();
  zoomAt(r.width / 2, r.height / 2, 1 + delta);
}

function zoomIn()  { zoomBy(0.15); }
function zoomOut() { zoomBy(-0.15); }

function fitAll() {
  // measure the actual rendered SVG size
  const svg = scene.querySelector('svg');
  if (!svg) return;
  const sw = svg.getBoundingClientRect().width / scale || svg.scrollWidth;
  const sh = svg.getBoundingClientRect().height / scale || svg.scrollHeight;
  const cw = canvas.clientWidth;
  const ch = canvas.clientHeight;
  scale = Math.max(Math.min((cw - 80) / sw, (ch - 80) / sh), MIN_SCALE);
  tx = (cw - sw * scale) / 2;
  ty = (ch - sh * scale) / 2;
  applyTransform();
}

function resetView() {
  scale = 1; tx = 40; ty = 40; applyTransform();
}

// Hold-to-repeat
let repeatTimer = null;
function startRepeat(fn) { fn(); repeatTimer = setInterval(fn, 80); }
function stopRepeat() { clearInterval(repeatTimer); repeatTimer = null; }

// Wheel
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  zoomAt(e.clientX - r.left, e.clientY - r.top, e.deltaY < 0 ? 1.15 : 0.87);
}, { passive: false });

// Mouse drag
let dragging = false, lmx = 0, lmy = 0;
canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  dragging = true; lmx = e.clientX; lmy = e.clientY;
  canvas.classList.add('panning');
});
window.addEventListener('mouseup', () => { dragging = false; canvas.classList.remove('panning'); });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx += e.clientX - lmx; ty += e.clientY - lmy;
  lmx = e.clientX; lmy = e.clientY;
  applyTransform();
});

// Touch
let tpts = {}, pd0 = null, ps0 = 1, pcx = 0, pcy = 0, ltx2 = 0, lty2 = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  [...e.changedTouches].forEach(t => tpts[t.identifier] = [t.clientX, t.clientY]);
  const k = Object.keys(tpts);
  if (k.length === 2) {
    const a = tpts[k[0]], b = tpts[k[1]];
    pd0 = Math.hypot(b[0]-a[0], b[1]-a[1]);
    ps0 = scale;
    const r = canvas.getBoundingClientRect();
    pcx = (a[0]+b[0])/2 - r.left;
    pcy = (a[1]+b[1])/2 - r.top;
  }
  if (e.touches.length === 1) { ltx2 = e.touches[0].clientX; lty2 = e.touches[0].clientY; }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length >= 2) {
    const t0 = e.touches[0], t1 = e.touches[1];
    const dist = Math.hypot(t1.clientX-t0.clientX, t1.clientY-t0.clientY);
    if (pd0) {
      const ns = Math.min(Math.max(ps0 * (dist/pd0), MIN_SCALE), MAX_SCALE);
      const ratio = ns / scale; scale = ns;
      tx = pcx - ratio*(pcx-tx); ty = pcy - ratio*(pcy-ty);
    }
    const r = canvas.getBoundingClientRect();
    const nx = (t0.clientX+t1.clientX)/2 - r.left;
    const ny = (t0.clientY+t1.clientY)/2 - r.top;
    tx += nx - pcx; ty += ny - pcy; pcx = nx; pcy = ny;
    applyTransform();
  } else if (e.touches.length === 1) {
    const t = e.touches[0];
    tx += t.clientX - ltx2; ty += t.clientY - lty2;
    ltx2 = t.clientX; lty2 = t.clientY;
    applyTransform();
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  [...e.changedTouches].forEach(t => delete tpts[t.identifier]);
  pd0 = null;
  if (e.touches.length === 1) { ltx2 = e.touches[0].clientX; lty2 = e.touches[0].clientY; }
}, { passive: false });

// Keyboard
window.addEventListener('keydown', e => {
  if (e.key==='+' || e.key==='=') zoomBy(0.2);
  if (e.key==='-' || e.key==='_') zoomBy(-0.2);
  if (e.key==='0') fitAll();
  if (e.key==='1') resetView();
});

// Render diagram manually so we control the output
async function renderDiagram() {
  try {
    const { svg } = await mermaid.render('diagram', DIAGRAM);
    scene.innerHTML = svg;

    // Force a large explicit width on the SVG so text is big
    const svgEl = scene.querySelector('svg');
    if (svgEl) {
      // Get the viewBox to calculate aspect ratio
      const vb = svgEl.getAttribute('viewBox');
      if (vb) {
        const parts = vb.split(/\s+|,/).map(Number);
        const vw = parts[2], vh = parts[3];
        const aspect = vh / vw;
        const targetWidth = 10000;
        svgEl.setAttribute('width',  targetWidth);
        svgEl.setAttribute('height', Math.round(targetWidth * aspect));
        svgEl.style.width  = targetWidth + 'px';
        svgEl.style.height = 'auto';
      } else {
        svgEl.style.width  = '10000px';
        svgEl.style.height = 'auto';
      }
    }

    document.getElementById('loading').style.display = 'none';
    setTimeout(fitAll, 100);
  } catch(err) {
    document.getElementById('loading').innerHTML =
      '<span style="color:#f85149">Render error: ' + err.message + '</span>';
    console.error(err);
  }
}

renderDiagram();
</script>
